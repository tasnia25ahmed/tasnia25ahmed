name: Generate GitHub Stats SVGs

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 1. Generate the Main Stats Card
      - name: Generate Main Stats Card
        uses: soulteary/github-readme-stats-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          card: stats
          path: ./profile-stats/stats-basic.svg
          options: username=tasnia25ahmed&theme=radical&hide_border=true&show_icons=true

      # 2. Generate the Top Languages Card
      - name: Generate Top Languages Card
        uses: soulteary/github-readme-stats-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          card: top-langs
          path: ./profile-stats/top-langs-basic.svg
          options: username=tasnia25ahmed&theme=radical&hide_border=true&layout=compact

      # 3. Commit and push the SVGs back to your repo
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p ./profile-stats
          git add ./profile-stats/*.svg
          git commit -m "chore: update github profile stats SVGs" || exit 0
          git push
